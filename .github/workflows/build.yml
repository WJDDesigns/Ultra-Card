# Kept for branch protection / legacy "Build" checks on main.
# Parity with ci.yml: typecheck, lint, tests, translations, production build.
name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Release checks and production build
        run: npm run release:check

      - name: Bundle size check
        run: |
          SIZE=$(stat -c%s dist/ultra-card.js)
          echo "Bundle size: $SIZE bytes"
          if [ "$SIZE" -gt 8388608 ]; then
            echo "::warning::Bundle size ($SIZE bytes) exceeds 8MB. Consider lazy-loading more modules."
          fi
