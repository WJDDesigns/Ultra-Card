name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Same gates as local `npm run release:check` and CI (typecheck, lint, tests, translations, build)
      - name: Release checks and production build
        run: npm run release:check

      - name: Verify build files
        run: |
          echo "Checking dist directory..."
          ls -la dist/
          echo "Checking main files..."
          ls -la ultra-card.js* hacs.json README.md license

      - name: Copy chunk files to root for HACS serving
        run: |
          echo "Copying lazy-load chunk files to root..."
          cp dist/uc-*.js . 2>/dev/null || true
          cp dist/uc-*.js.LICENSE.txt . 2>/dev/null || true
          cp dist/ultra-card-panel.js . 2>/dev/null || true
          cp dist/ultra-card-panel.js.LICENSE.txt . 2>/dev/null || true
          echo "Root JS files after copy:"
          ls -la *.js | head -20
          echo "Total uc-* chunk files: $(ls uc-*.js 2>/dev/null | wc -l)"

      - name: Create Release Archive
        run: |
          mkdir -p release
          cp ultra-card.js release/
          cp ultra-card.js.LICENSE.txt release/ 2>/dev/null || true
          cp ultra-card-panel.js release/ 2>/dev/null || true
          cp ultra-card-panel.js.LICENSE.txt release/ 2>/dev/null || true
          cp uc-*.js release/ 2>/dev/null || true
          cp uc-*.js.LICENSE.txt release/ 2>/dev/null || true
          cp hacs.json release/
          cp README.md release/
          cp license release/
          cd release
          zip -r ../ultra-card-${{ github.ref_name }}.zip .
          cd ..
          echo "Archive contents:"
          unzip -l ultra-card-${{ github.ref_name }}.zip

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: release_notes
        run: |
          VERSION="${{ github.ref_name }}"
          # Remove 'v' prefix from version for matching
          VERSION_NUM="${VERSION#v}"

          echo "Looking for release notes for version: $VERSION_NUM"

          # Try to extract release notes from RELEASE_NOTES.md
          if [ -f "RELEASE_NOTES.md" ]; then
            echo "Found RELEASE_NOTES.md, extracting notes for version $VERSION_NUM..."
            
            # Extract the section for this version from RELEASE_NOTES.md
            # Look for "## Version $VERSION_NUM" and extract until the next "## Version" or end of file
            RELEASE_NOTES=$(awk -v version="$VERSION_NUM" '
              BEGIN { found=0; printing=0 }
              /^## Version/ {
                if ($3 == version) {
                  found=1
                  printing=1
                  next
                } else if (found && printing) {
                  exit
                }
              }
              printing && found { print }
            ' RELEASE_NOTES.md)
            
            if [ -n "$RELEASE_NOTES" ]; then
              echo "Successfully extracted release notes from RELEASE_NOTES.md"
              echo "$RELEASE_NOTES" > release_notes.md
            else
              echo "Version $VERSION_NUM not found in RELEASE_NOTES.md, using fallback"
              cat > release_notes.md << 'EOF'
          ## 🔗 Recent Updates

          Please check the [Release Notes](https://github.com/WJDDesigns/Ultra-Card/blob/main/RELEASE_NOTES.md) for detailed information about this release.

          ## 📝 Changes

          This release includes various improvements and bug fixes. See the full changelog in our repository.
          EOF
            fi
          else
            echo "RELEASE_NOTES.md not found, using default notes"
            cat > release_notes.md << 'EOF'
          ## 🔗 Recent Updates

          Please check the [Release Notes](https://github.com/WJDDesigns/Ultra-Card/blob/main/RELEASE_NOTES.md) for detailed information about this release.
          EOF
          fi

          echo "Generated release notes:"
          cat release_notes.md
          echo ""

          # Set the release notes as output
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: What's New in ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: false
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          files: |
            ultra-card-${{ github.ref_name }}.zip
            ultra-card.js
            ultra-card-panel.js
            uc-*.js
            uc-*.js.LICENSE.txt

      # NOTE: Discord notifications are intentionally NOT sent from this
      # workflow. The dedicated `announce-release.yml` workflow listens on the
      # `release` event and is the single source of truth for the Discord
      # announcement (one message per release, color-coded by stable/pre-release).
      # Posting from here too would produce duplicate messages in the
      # announcements channel.
